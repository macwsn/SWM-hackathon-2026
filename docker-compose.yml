  # ═══════════════════════════════════════════════════════════════
  # AI INFERENCE LAYER - Depth Workers
  # ═══════════════════════════════════════════════════════════════

  depth-worker-a:
    image: depth-worker:v1
    build:
      context: ./services/depth-worker-a
      dockerfile: Dockerfile
    # GPU configuration - DISABLED for macOS/local development
    # Uncomment for Linux with NVIDIA GPU:
    # deploy:
    #   replicas: 2
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_ID=depth-worker-a-1
      - MODEL_DEVICE=cpu  # Use CPU for macOS (change to 'cuda' on Linux with GPU)
      - BATCH_SIZE=1
      - INDOOR_MODEL_ID=depth-anything/Depth-Anything-V2-Metric-Indoor-Small-hf
      - OUTDOOR_MODEL_ID=depth-anything/Depth-Anything-V2-Metric-Outdoor-Small-hf
      - HUGGINGFACE_CACHE=/models/cache
      - LOG_LEVEL=INFO
    volumes:
      - model-cache:/models/cache
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - inference-network
      - backend-network
    restart: unless-stopped
    ports:
      - "8000:8000"  # Prometheus metrics

