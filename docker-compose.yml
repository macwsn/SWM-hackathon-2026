services:
  # ═══════════════════════════════════════════════════════════════
  # FRONTEND - React SPA
  # ═══════════════════════════════════════════════════════════════

  frontend:
    image: blind-assistant-frontend:v1
    build:
      context: ./project/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - frontend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # BACKEND - FastAPI Monolith (transitioning to microservices)
  # ═══════════════════════════════════════════════════════════════

  backend:
    image: blind-assistant-backend:v1
    build:
      context: ./project/backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,https://localhost:5173
      - USE_MOCK_GEMINI=true
      - USE_MOCK_SMELTER=true
      - USE_MOCK_LOCATION=true
      - USE_MOCK_DEPTH=false
      - DEPTH_MODEL_DEVICE=cpu
      - DEPTH_INFERENCE_INTERVAL=0.5
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./project/backend/video_input:/app/video_input
      - model-cache:/app/models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - frontend-network
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

